<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Profile Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background:whitesmoke;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    
    .card {
      display: flex;
      flex-direction: row;
      align-items: center;
      background-color: white;
      width: 420px;
      border-radius: 16px;
      margin: 20px;
    }

    
    .card img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      margin: 20px;
      flex-shrink: 0;
    }


    .h2 {
      font-size: 1.8rem;
      margin:  10px;
      color: #333;
    }

    .p {
      font-size: 0.95rem;
      color: grey;
      margin-bottom: 15px;
    }

    
    .buttons {
      display: flex;
      gap: 10px;
    }

    .buttons a {
      text-decoration: none;
      background: #007bff;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      
    }

    .buttons a:hover {
      background: blue;
    }

    @media (max-width: 640px) {
      .card {
        flex-direction: column;
        width: 70vw;
        text-align: center;
        padding: 20px 10px;
      }

      .card img {
        width: 120px;
        height: 120px;
        margin: 0 auto 15px;
      }

      .buttons {
        flex-direction: column;
        width: 100%;
      }

      .buttons a {
        display: block;
        width: 90%;
        margin: 5px auto;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://imgs.search.brave.com/GUifgzOLGho4tfX88G-2lhQfo06mvS-OJVJurktCLyk/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9jZG4u/dmVjdG9yc3RvY2su/Y29tL2kvNTAwcC8y/Ni8yNS9jb250YWN0/LXBpeGVsLXBlcmZl/Y3QtZ2xhc3Ntb3Jw/aGlzbS11aS1pY29u/LXZlY3Rvci00NDgy/MjYyNS5qcGc" alt="Profile Picture">
    <div class="info">
      <h2>Hamsini</h2>
      <p>Like playing chess,Reading books and listning to music.</p>
      <div class="buttons">
        <a href="https://www.linkedin.com/in/hamsini-v-mothkur-15b628384?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app">Contact</a>
        <a href="https://project-iota-wheat-91.vercel.app/">Portfolio</a>
      </div>
    </div>
  </div>
</body>
</html>
