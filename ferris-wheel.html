<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ferris-wheel</title>
    <style>
        .wheel{
            position: absolute;
            height:60vh;
            width: 60vw;
            max-width: 500px;
            max-height: 500px;
            border:2px solid black;
            border-radius: 50%;
            margin-left: 100px;
            top: 20%;
             animation-name: wheel;
            animation-duration: 10s;
            animation-timing-function:linear;
            animation-iteration-count: infinite;

            
        }
        .line{
            transform-origin: 0% 0%;
            background-color: black;
            width: 50%;
            height: 2px;
            position: absolute;
            left: 50%;
            top: 50%;
            left: 50%;
        }
        .line:nth-of-type(1){
            transform: rotate(60deg);
        }
        .line:nth-of-type(2){
            transform: rotate(120deg);
        }
        .line:nth-of-type(3){
            transform: rotate(180deg);
        }
        .line:nth-of-type(4){
            transform: rotate(240deg);
        }
        .line:nth-of-type(5){
            transform: rotate(300deg);
        }
        .line:nth-of-type(6){
            transform: rotate(360deg);
        }
        .cabin{
            transform-origin: 50% 0%;
            background-color: indigo;
            width: 20%;
            height: 20%;
            position: absolute;
            border: 3px solid;
          animation-name: cabins;
            animation-duration: 10s;
            animation-timing-function:ease-in-out ;
            animation-iteration-count: infinite;

        }
        .cabin:nth-of-type(1){
            right: -10%;
            top: 49%;

        }
        .cabin:nth-of-type(2){
            right: 15%;
            top: 93.5%;

        }
        .cabin:nth-of-type(3){
            right: 62%;
            top: 5.5%;

        }
        .cabin:nth-of-type(4){
            right:60.5%;
            top: 90.5%;

        }
        .cabin:nth-of-type(5){
            right: 15%;
            top: 5%;

        }
        .cabin:nth-of-type(6){
            right:90%;
            top: 47%;

        }
        
        @keyframes wheel{
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }
             
        }
        @keyframes cabins {
            0%{
                transform: rotate(0deg);
                
            }
            25%{
                background-color: dodgerblue;
            }
            50%{
                background-color: darkslateblue;
            }
            75%{
                background-color:cornflowerblue ;
            }
            100%{
                transform: rotate(360deg);
                
            }

        }
    </style>
</head>
<body>
    <div class="wheel">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
        <div class="cabin"></div>
        <div class="cabin"></div>
        <div class="cabin"></div>
        <div class="cabin"></div>
        <div class="cabin"></div>
        <div class="cabin"></div>
       
    </div>
</body>
</html>
