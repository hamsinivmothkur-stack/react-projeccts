<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NGO Event Explorer 🤝 | Discover & Register for Social Impact Events</title>
  <meta name="description" content="Discover and register for social impact events. Browse upcoming NGO events, search by name, and track your registrations." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.7);
      --bg-glass: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --accent-light: #818cf8;
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.25);
      --coral: #f472b6;
      --amber: #fbbf24;
      --cyan: #22d3ee;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Ambient Background ───────────────────────── */
    .ambient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .ambient-bg .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: float 20s ease-in-out infinite;
    }
    .ambient-bg .orb:nth-child(1) {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -10%; left: -5%;
      animation-delay: 0s;
    }
    .ambient-bg .orb:nth-child(2) {
      width: 500px; height: 500px;
      background: var(--coral);
      bottom: -10%; right: -5%;
      animation-delay: -7s;
    }
    .ambient-bg .orb:nth-child(3) {
      width: 400px; height: 400px;
      background: var(--cyan);
      top: 40%; left: 50%;
      animation-delay: -14s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ── App Container ────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent-light);
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 50%, var(--coral) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .header p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      max-width: 550px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Stats Bar ────────────────────────────────── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      padding: 12px 22px;
      border-radius: 100px;
      backdrop-filter: blur(10px);
      transition: var(--transition);
    }
    .stat-item:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .stat-icon.events { background: rgba(99, 102, 241, 0.15); }
    .stat-icon.registered { background: var(--success-glow); }
    .stat-icon.showing { background: rgba(251, 191, 36, 0.15); }
    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Controls ─────────────────────────────────── */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 260px;
      position: relative;
    }
    .search-box .icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--text-muted);
      pointer-events: none;
      transition: var(--transition);
    }
    .search-box input {
      width: 100%;
      padding: 14px 18px 14px 50px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-box input:focus + .icon { color: var(--accent-light); }

    .filter-group {
      display: flex;
      gap: 4px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      backdrop-filter: blur(10px);
    }
    .filter-btn {
      padding: 10px 20px;
      border: none;
      border-radius: calc(var(--radius) - 4px);
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .filter-btn:hover { color: var(--text-primary); }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* ── Event Grid ───────────────────────────────── */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── Event Card ───────────────────────────────── */
    .event-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      backdrop-filter: blur(16px);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: cardIn 0.5s ease-out both;
    }
    .event-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--coral));
      opacity: 0;
      transition: var(--transition);
    }
    .event-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }
    .event-card:hover::before { opacity: 1; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-category {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 6px;
      width: fit-content;
      margin-bottom: 14px;
    }
    .cat-environment { background: rgba(16, 185, 129, 0.12); color: #34d399; }
    .cat-education { background: rgba(99, 102, 241, 0.12); color: var(--accent-light); }
    .cat-health { background: rgba(244, 114, 182, 0.12); color: var(--coral); }
    .cat-community { background: rgba(251, 191, 36, 0.12); color: var(--amber); }
    .cat-technology { background: rgba(34, 211, 238, 0.12); color: var(--cyan); }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 18px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .meta-row .emoji { font-size: 0.95rem; }

    .meta-row.past-date { color: #ef4444; }
    .meta-row.upcoming-date { color: var(--success); }

    .register-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-glass);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .register-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 18px var(--accent-glow);
      color: #fff;
    }
    .register-btn.registered {
      background: var(--success-glow);
      border-color: rgba(16, 185, 129, 0.3);
      color: var(--success);
      cursor: default;
    }
    .register-btn.registered:hover {
      background: var(--success-glow);
      border-color: rgba(16, 185, 129, 0.3);
      box-shadow: none;
      color: var(--success);
    }

    /* ── Loader ───────────────────────────────────── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 20px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: var(--text-muted); font-size: 0.9rem; }

    /* ── Empty State ──────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 {
      font-size: 1.2rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .empty-state p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 640px) {
      .app { padding: 24px 16px 60px; }
      .stats-bar { gap: 12px; }
      .stat-item { padding: 10px 16px; }
      .controls { flex-direction: column; }
      .event-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Ambient Background Orbs -->
  <div class="ambient-bg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <div class="badge">🤝 Social Impact Platform</div>
      <h1>NGO Event Explorer</h1>
      <p>Discover meaningful events, connect with change-makers, and register to make a difference in your community.</p>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-icon events">📋</div>
        <div>
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">Total Events</div>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-icon registered">✅</div>
        <div>
          <div class="stat-value" id="registeredCount">0</div>
          <div class="stat-label">Registered</div>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-icon showing">👁️</div>
        <div>
          <div class="stat-value" id="showingCount">0</div>
          <div class="stat-label">Showing</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search events by name..." />
        <span class="icon">🔍</span>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all" id="filterAll">All</button>
        <button class="filter-btn" data-filter="upcoming" id="filterUpcoming">Upcoming</button>
        <button class="filter-btn" data-filter="past" id="filterPast">Past</button>
      </div>
    </div>

    <!-- Event Grid -->
    <div id="eventGrid" class="event-grid"></div>
  </div>

<script>
  // ── State ──────────────────────────────────────
  let events = [];
  let searchText = '';
  let registeredEvents = new Set();
  let activeFilter = 'all'; // 'all' | 'upcoming' | 'past'

  const today = new Date();

  // ── Categories & Locations ─────────────────────
  const categories = ['Environment', 'Education', 'Health', 'Community', 'Technology'];
  const catClasses  = ['cat-environment', 'cat-education', 'cat-health', 'cat-community', 'cat-technology'];
  const catEmojis   = ['🌿', '📚', '💊', '🏘️', '💻'];

  const locations = [
    'Mumbai, India', 'New Delhi, India', 'Bangalore, India',
    'Chennai, India', 'Hyderabad, India', 'Pune, India',
    'Kolkata, India', 'Ahmedabad, India', 'Jaipur, India',
    'Lucknow, India', 'Kochi, India', 'Chandigarh, India'
  ];

  // Deterministic pseudo-random from id
  function seeded(id, max) { return id % max; }

  // Generate a readable event date from post id
  function generateDate(id) {
    const base = new Date(today);
    // Spread events: some past, some upcoming
    const offset = (id % 30) - 12; // roughly -12 to +17 days from now
    base.setDate(base.getDate() + offset);
    return base;
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-IN', {
      weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
    });
  }

  // Map a post → event
  function mapPostToEvent(post) {
    const catIndex = seeded(post.id, categories.length);
    const date = generateDate(post.id);
    return {
      id: post.id,
      title: capitalise(post.title),
      description: post.body,
      category: categories[catIndex],
      categoryClass: catClasses[catIndex],
      categoryEmoji: catEmojis[catIndex],
      date,
      dateStr: formatDate(date),
      isUpcoming: date >= today,
      location: locations[seeded(post.id, locations.length)]
    };
  }

  function capitalise(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  // ── Fetch ──────────────────────────────────────
  async function fetchEvents() {
    showLoader();
    try {
      const res = await fetch('https://jsonplaceholder.typicode.com/posts');
      const posts = await res.json();
      events = posts.map(mapPostToEvent);
      render();
    } catch (err) {
      document.getElementById('eventGrid').innerHTML =
        '<div class="empty-state"><div class="emoji">⚠️</div><h3>Failed to load events</h3><p>Please check your internet connection and refresh.</p></div>';
    }
  }

  function showLoader() {
    document.getElementById('eventGrid').innerHTML =
      '<div class="loader"><div class="spinner"></div><div class="loader-text">Fetching events…</div></div>';
  }

  // ── Filtering ──────────────────────────────────
  function getFilteredEvents() {
    let filtered = events;

    // Search
    if (searchText.trim()) {
      const q = searchText.toLowerCase();
      filtered = filtered.filter(e => e.title.toLowerCase().includes(q));
    }

    // Time filter
    if (activeFilter === 'upcoming') {
      filtered = filtered.filter(e => e.isUpcoming);
    } else if (activeFilter === 'past') {
      filtered = filtered.filter(e => !e.isUpcoming);
    }

    return filtered;
  }

  // ── Render ─────────────────────────────────────
  function render() {
    const filtered = getFilteredEvents();

    // Stats
    document.getElementById('totalCount').textContent = events.length;
    document.getElementById('registeredCount').textContent = registeredEvents.size;
    document.getElementById('showingCount').textContent = filtered.length;

    const grid = document.getElementById('eventGrid');

    if (filtered.length === 0) {
      grid.innerHTML =
        '<div class="empty-state"><div class="emoji">🔎</div><h3>No events found</h3><p>Try a different search term or filter.</p></div>';
      return;
    }

    grid.innerHTML = filtered.map((ev, i) => {
      const isReg = registeredEvents.has(ev.id);
      const dateClass = ev.isUpcoming ? 'upcoming-date' : 'past-date';
      return `
        <div class="event-card" style="animation-delay:${i * 0.04}s">
          <span class="card-category ${ev.categoryClass}">${ev.categoryEmoji} ${ev.category}</span>
          <div class="card-title">${ev.title}</div>
          <div class="card-desc">${ev.description}</div>
          <div class="card-meta">
            <div class="meta-row ${dateClass}">
              <span class="emoji">📅</span>
              <span>${ev.dateStr}${ev.isUpcoming ? '' : ' (Past)'}</span>
            </div>
            <div class="meta-row">
              <span class="emoji">📍</span>
              <span>${ev.location}</span>
            </div>
          </div>
          <button
            id="reg-btn-${ev.id}"
            class="register-btn${isReg ? ' registered' : ''}"
            onclick="toggleRegister(${ev.id})"
          >${isReg ? 'Registered ✅' : 'Register'}</button>
        </div>`;
    }).join('');
  }

  // ── Register Toggle ────────────────────────────
  function toggleRegister(id) {
    if (registeredEvents.has(id)) return;  // already registered
    registeredEvents.add(id);
    render();
  }

  // ── Event Listeners ────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    searchText = e.target.value;
    render();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  // ── Init ───────────────────────────────────────
  fetchEvents();
</script>

</body>
</html>
