<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Moon Orbit.html</title>
<style>
  .space {
    height: 100vh;
    background-color: black;
    position: relative;
    overflow: hidden;
  }
  .earth {
    width: 100px;
    height: 100px;
     border-radius: 50%;
     background-color: blue;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 30px cyan;
    
  }
  .orbit {
    width: 300px;
    height: 300px;
    border: 1px dashed rgba(255, 255, 255, 0.73);
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: 50% 50%;
    transform: translate(-50%, -50%);
    animation: spinOrbit 20s linear infinite;
  }
  .moon {
    width: 50px;
    height: 50px;
    background-color: rgba(249, 238, 238, 0.686);
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 75%;
    margin-left: -20px;
    box-shadow: 0 0 15px white;
    animation: spinMoon 5s linear infinite;
  }

  @keyframes spinOrbit {
    100% {
      transform: translate(-50%, -50%) rotate(360deg);
    }
  }
  
  @keyframes spinMoon {
    100% {
      transform: rotate(360deg);
    }
  }
</style>
</head>
<body>
  <div class="space">
    <div class="earth"></div>
    <div class="orbit">
      <div class="moon"></div>
    </div>
  </div>
</body>
</html>
