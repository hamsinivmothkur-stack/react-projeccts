<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Attendance Viewer 🎓 | Track & Analyze Attendance</title>
  <meta name="description" content="A visual attendance tracker for teachers to monitor student attendance, filter by status, and identify low-performing students." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #06090f;
      --bg-secondary: #0c1220;
      --bg-card: rgba(12, 18, 32, 0.85);
      --bg-glass: rgba(255, 255, 255, 0.03);
      --bg-row: rgba(255, 255, 255, 0.02);
      --bg-row-hover: rgba(255, 255, 255, 0.05);
      --bg-row-selected: rgba(99, 102, 241, 0.08);
      --border: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.14);
      --border-selected: rgba(99, 102, 241, 0.3);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --accent-light: #818cf8;
      --green: #10b981;
      --green-soft: rgba(16, 185, 129, 0.12);
      --green-border: rgba(16, 185, 129, 0.25);
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.10);
      --red-border: rgba(239, 68, 68, 0.25);
      --amber: #f59e0b;
      --amber-soft: rgba(245, 158, 11, 0.10);
      --cyan: #22d3ee;
      --coral: #f472b6;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Ambient BG ───────────────────────────────── */
    .ambient {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .ambient .orb {
      position: absolute; border-radius: 50%;
      filter: blur(130px); opacity: 0.12;
      animation: drift 22s ease-in-out infinite;
    }
    .ambient .orb:nth-child(1) {
      width: 550px; height: 550px;
      background: var(--accent); top: -8%; left: -4%;
    }
    .ambient .orb:nth-child(2) {
      width: 450px; height: 450px;
      background: var(--green); bottom: -6%; right: -3%;
      animation-delay: -8s;
    }
    .ambient .orb:nth-child(3) {
      width: 350px; height: 350px;
      background: var(--coral); top: 50%; left: 55%;
      animation-delay: -15s;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -25px) scale(1.04); }
      66% { transform: translate(-20px, 15px) scale(0.96); }
    }

    /* ── App Shell ────────────────────────────────── */
    .app {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ───────────────────────────────────── */
    .header { text-align: center; margin-bottom: 44px; }
    .header .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--bg-glass); border: 1px solid var(--border);
      padding: 6px 16px; border-radius: 100px;
      font-size: 0.78rem; font-weight: 500;
      color: var(--accent-light); margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }
    .header h1 {
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 50%, var(--green) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 10px;
    }
    .header p {
      color: var(--text-secondary); font-size: 1rem;
      max-width: 520px; margin: 0 auto; line-height: 1.6;
    }

    /* ── Stats Row ────────────────────────────────── */
    .stats-row {
      display: flex; justify-content: center;
      gap: 16px; margin-bottom: 32px; flex-wrap: wrap;
    }
    .stat-pill {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-glass); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 100px;
      backdrop-filter: blur(10px); transition: var(--transition);
    }
    .stat-pill:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .stat-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .stat-dot.total { background: var(--accent-light); }
    .stat-dot.present { background: var(--green); }
    .stat-dot.absent { background: var(--red); }
    .stat-dot.low { background: var(--amber); }
    .stat-val { font-size: 1.15rem; font-weight: 700; }
    .stat-lbl { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Controls ─────────────────────────────────── */
    .controls {
      display: flex; gap: 12px; margin-bottom: 28px;
      flex-wrap: wrap; align-items: center;
    }
    .filter-group {
      display: flex; gap: 4px;
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 4px;
      backdrop-filter: blur(10px);
    }
    .filter-btn {
      padding: 9px 18px; border: none;
      border-radius: calc(var(--radius) - 4px);
      background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 0.83rem; font-weight: 500;
      cursor: pointer; transition: var(--transition); white-space: nowrap;
    }
    .filter-btn:hover { color: var(--text-primary); }
    .filter-btn.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .toggle-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-left: auto;
    }
    .toggle-label {
      font-size: 0.83rem; color: var(--text-secondary);
      cursor: pointer; user-select: none;
    }
    .toggle {
      position: relative; width: 44px; height: 24px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute; inset: 0;
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: 100px; transition: var(--transition);
    }
    .toggle .slider::before {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: var(--text-muted); border-radius: 50%;
      transition: var(--transition);
    }
    .toggle input:checked + .slider {
      background: var(--red-soft); border-color: var(--red-border);
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px); background: var(--red);
    }

    .sort-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--bg-glass);
      color: var(--text-secondary); font-family: inherit;
      font-size: 0.83rem; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      backdrop-filter: blur(10px); white-space: nowrap;
    }
    .sort-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }
    .sort-btn.active { color: var(--accent-light); border-color: var(--accent); }
    .sort-arrow { font-size: 0.75rem; transition: transform 0.2s; }
    .sort-btn.desc .sort-arrow { transform: rotate(180deg); }

    /* ── Table Card ───────────────────────────────── */
    .table-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); backdrop-filter: blur(16px);
      overflow: hidden; animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Table ────────────────────────────────────── */
    .att-table { width: 100%; border-collapse: collapse; }
    .att-table thead th {
      padding: 14px 20px; text-align: left;
      font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg-glass);
    }
    .att-table thead th:last-child { text-align: center; }

    .att-table tbody tr {
      cursor: pointer; transition: var(--transition);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .att-table tbody tr:hover { background: var(--bg-row-hover); }
    .att-table tbody tr.selected {
      background: var(--bg-row-selected);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .att-table tbody tr:last-child { border-bottom: none; }

    .att-table td {
      padding: 16px 20px;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    /* ── Student Info Cell ─────────────────────────── */
    .student-info { display: flex; align-items: center; gap: 14px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700;
      flex-shrink: 0;
    }
    .avatar.green { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-border); }
    .avatar.red   { background: var(--red-soft);   color: var(--red);   border: 1px solid var(--red-border); }
    .student-name { font-weight: 600; color: var(--text-primary); }
    .student-email { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Attendance Bar ────────────────────────────── */
    .att-cell { min-width: 180px; }
    .att-bar-wrap {
      display: flex; align-items: center; gap: 10px;
    }
    .att-track {
      flex: 1; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .att-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.6s ease-out;
    }
    .att-fill.green { background: linear-gradient(90deg, #10b981, #34d399); }
    .att-fill.red   { background: linear-gradient(90deg, #ef4444, #f87171); }
    .att-pct {
      font-size: 0.88rem; font-weight: 700;
      min-width: 40px; text-align: right;
    }
    .att-pct.green { color: var(--green); }
    .att-pct.red   { color: var(--red); }

    /* ── Status Badge ─────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 100px;
      font-size: 0.75rem; font-weight: 600;
    }
    .status-badge.present {
      background: var(--green-soft); color: var(--green);
      border: 1px solid var(--green-border);
    }
    .status-badge.absent {
      background: var(--red-soft); color: var(--red);
      border: 1px solid var(--red-border);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .status-dot.present { background: var(--green); }
    .status-dot.absent  { background: var(--red); }

    td.status-cell { text-align: center; }

    /* ── Detail Panel ─────────────────────────────── */
    .detail-panel {
      margin-top: 24px; padding: 28px;
      background: var(--bg-card); border: 1px solid var(--border-selected);
      border-radius: var(--radius); backdrop-filter: blur(16px);
      animation: fadeUp 0.35s ease-out;
      display: none;
    }
    .detail-panel.visible { display: block; }
    .detail-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }
    .detail-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800;
    }
    .detail-name { font-size: 1.25rem; font-weight: 700; }
    .detail-sub { font-size: 0.85rem; color: var(--text-muted); }
    .detail-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .detail-item {
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 18px;
    }
    .detail-item-label {
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px;
    }
    .detail-item-value { font-size: 1rem; font-weight: 600; }

    /* ── Loader & Empty ───────────────────────────── */
    .loader { display: flex; flex-direction: column; align-items: center; padding: 60px; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: var(--text-muted); font-size: 0.88rem; }
    .empty { text-align: center; padding: 60px 20px; }
    .empty .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .empty h3 { font-size: 1.1rem; margin-bottom: 6px; }
    .empty p { color: var(--text-muted); font-size: 0.88rem; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 768px) {
      .app { padding: 24px 14px 60px; }
      .controls { flex-direction: column; }
      .toggle-wrap { margin-left: 0; }
      .att-table thead th, .att-table td { padding: 12px 12px; }
      .att-cell { min-width: 120px; }
      .student-email { display: none; }
      .detail-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 500px) {
      .table-card { overflow-x: auto; }
      .att-table { min-width: 560px; }
    }
  </style>
</head>
<body>

  <div class="ambient">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="badge">🎓 Classroom Analytics</div>
      <h1>Student Attendance Viewer</h1>
      <p>Track attendance, identify at-risk students, and gain insights into classroom participation patterns.</p>
    </header>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-pill">
        <span class="stat-dot total"></span>
        <div>
          <div class="stat-val" id="statTotal">0</div>
          <div class="stat-lbl">Students</div>
        </div>
      </div>
      <div class="stat-pill">
        <span class="stat-dot present"></span>
        <div>
          <div class="stat-val" id="statPresent">0</div>
          <div class="stat-lbl">Present</div>
        </div>
      </div>
      <div class="stat-pill">
        <span class="stat-dot absent"></span>
        <div>
          <div class="stat-val" id="statAbsent">0</div>
          <div class="stat-lbl">Absent</div>
        </div>
      </div>
      <div class="stat-pill">
        <span class="stat-dot low"></span>
        <div>
          <div class="stat-val" id="statLow">0</div>
          <div class="stat-lbl">&lt;75%</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all" id="btnAll">All</button>
        <button class="filter-btn" data-filter="present" id="btnPresent">Present</button>
        <button class="filter-btn" data-filter="absent" id="btnAbsent">Absent</button>
      </div>

      <button class="sort-btn" id="sortBtn" title="Sort by attendance %">
        <span>Sort by %</span>
        <span class="sort-arrow">▲</span>
      </button>

      <div class="toggle-wrap">
        <label class="toggle" id="lowToggle">
          <input type="checkbox" id="lowCheck" />
          <span class="slider"></span>
        </label>
        <label class="toggle-label" for="lowCheck">Show &lt;75% only</label>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <table class="att-table">
        <thead>
          <tr>
            <th>Student</th>
            <th>Attendance</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="3">
            <div class="loader"><div class="spinner"></div><div class="loader-text">Loading students…</div></div>
          </td></tr>
        </tbody>
      </table>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div class="detail-avatar" id="detailAvatar"></div>
        <div>
          <div class="detail-name" id="detailName"></div>
          <div class="detail-sub" id="detailSub"></div>
        </div>
      </div>
      <div class="detail-grid" id="detailGrid"></div>
    </div>
  </div>

<script>
  // ── State ────────────────────────────────────
  let students = [];
  let filterType = 'all';      // 'all' | 'present' | 'absent'
  let selectedStudent = null;
  let showLowAttendance = false;
  let sortAsc = true;
  let sortActive = false;

  // ── Deterministic "random" from id ───────────
  function pseudoRandom(id) {
    // Simple hash-style spread
    const x = Math.sin(id * 9301 + 49297) * 49297;
    return Math.abs(x - Math.floor(x));
  }

  // ── Map user → student ──────────────────────
  function mapUser(user) {
    const attendance = Math.round(pseudoRandom(user.id) * 40 + 60); // 60-100
    return {
      id: user.id,
      name: user.name,
      email: user.email,
      phone: user.phone,
      company: user.company?.name || '',
      city: user.address?.city || '',
      website: user.website,
      attendance,
      status: attendance >= 75 ? 'present' : 'absent',
      initials: user.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()
    };
  }

  // ── Fetch ───────────────────────────────────
  async function fetchStudents() {
    try {
      const res = await fetch('https://jsonplaceholder.typicode.com/users');
      const users = await res.json();
      students = users.map(mapUser);
      render();
    } catch {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="3"><div class="empty"><div class="emoji">⚠️</div><h3>Failed to load</h3><p>Check your connection and refresh.</p></div></td></tr>';
    }
  }

  // ── Filtering & Sorting ─────────────────────
  function getFiltered() {
    let list = [...students];

    if (filterType === 'present') list = list.filter(s => s.status === 'present');
    else if (filterType === 'absent') list = list.filter(s => s.status === 'absent');

    if (showLowAttendance) list = list.filter(s => s.attendance < 75);

    if (sortActive) {
      list.sort((a, b) => sortAsc ? a.attendance - b.attendance : b.attendance - a.attendance);
    }

    return list;
  }

  // ── Render ──────────────────────────────────
  function render() {
    const filtered = getFiltered();
    const presentCount = students.filter(s => s.status === 'present').length;
    const absentCount  = students.filter(s => s.status === 'absent').length;
    const lowCount     = students.filter(s => s.attendance < 75).length;

    document.getElementById('statTotal').textContent   = students.length;
    document.getElementById('statPresent').textContent  = presentCount;
    document.getElementById('statAbsent').textContent   = absentCount;
    document.getElementById('statLow').textContent      = lowCount;

    const tbody = document.getElementById('tableBody');

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3"><div class="empty"><div class="emoji">🔎</div><h3>No students found</h3><p>Adjust your filters to see results.</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map((s, i) => {
      const colorClass = s.attendance >= 75 ? 'green' : 'red';
      const isSelected = selectedStudent && selectedStudent.id === s.id;
      return `
        <tr class="${isSelected ? 'selected' : ''}"
            onclick="selectStudent(${s.id})"
            style="animation: fadeUp 0.3s ease-out ${i * 0.04}s both">
          <td>
            <div class="student-info">
              <div class="avatar ${colorClass}">${s.initials}</div>
              <div>
                <div class="student-name">${s.name}</div>
                <div class="student-email">${s.email}</div>
              </div>
            </div>
          </td>
          <td class="att-cell">
            <div class="att-bar-wrap">
              <div class="att-track">
                <div class="att-fill ${colorClass}" style="width:${s.attendance}%"></div>
              </div>
              <span class="att-pct ${colorClass}">${s.attendance}%</span>
            </div>
          </td>
          <td class="status-cell">
            <span class="status-badge ${s.status}">
              <span class="status-dot ${s.status}"></span>
              ${s.status === 'present' ? 'Present' : 'Absent'}
            </span>
          </td>
        </tr>`;
    }).join('');

    renderDetail();
  }

  // ── Detail Panel ────────────────────────────
  function renderDetail() {
    const panel = document.getElementById('detailPanel');
    if (!selectedStudent) { panel.classList.remove('visible'); return; }

    const s = selectedStudent;
    const colorClass = s.attendance >= 75 ? 'green' : 'red';

    panel.classList.add('visible');
    document.getElementById('detailAvatar').className = `detail-avatar avatar ${colorClass}`;
    document.getElementById('detailAvatar').textContent = s.initials;
    document.getElementById('detailName').textContent = s.name;
    document.getElementById('detailSub').textContent = `${s.email}  ·  ${s.city}`;

    document.getElementById('detailGrid').innerHTML = `
      <div class="detail-item">
        <div class="detail-item-label">Attendance</div>
        <div class="detail-item-value" style="color:${s.attendance >= 75 ? 'var(--green)' : 'var(--red)'}">${s.attendance}%</div>
      </div>
      <div class="detail-item">
        <div class="detail-item-label">Status</div>
        <div class="detail-item-value">${s.status === 'present' ? '✅ Present' : '❌ Absent'}</div>
      </div>
      <div class="detail-item">
        <div class="detail-item-label">Phone</div>
        <div class="detail-item-value">${s.phone}</div>
      </div>
      <div class="detail-item">
        <div class="detail-item-label">Company</div>
        <div class="detail-item-value">${s.company}</div>
      </div>
      <div class="detail-item">
        <div class="detail-item-label">City</div>
        <div class="detail-item-value">${s.city}</div>
      </div>
      <div class="detail-item">
        <div class="detail-item-label">Website</div>
        <div class="detail-item-value">${s.website}</div>
      </div>`;
  }

  // ── Select Student ──────────────────────────
  function selectStudent(id) {
    const s = students.find(st => st.id === id);
    if (selectedStudent && selectedStudent.id === id) {
      selectedStudent = null;  // deselect
    } else {
      selectedStudent = s;
    }
    render();
  }

  // ── Event Listeners ─────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterType = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('lowCheck').addEventListener('change', e => {
    showLowAttendance = e.target.checked;
    render();
  });

  document.getElementById('sortBtn').addEventListener('click', () => {
    const btn = document.getElementById('sortBtn');
    if (!sortActive) {
      sortActive = true;
      sortAsc = true;
      btn.classList.add('active');
    } else if (sortAsc) {
      sortAsc = false;
      btn.classList.add('desc');
    } else {
      sortActive = false;
      sortAsc = true;
      btn.classList.remove('active', 'desc');
    }
    render();
  });

  // ── Init ────────────────────────────────────
  fetchStudents();
</script>

</body>
</html>
